<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Biblioteca - Login / Cadastro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div id="feedback-msg" class="message"></div>

        <div id="login-section">
            <h2>Acessar Sistema</h2>
            <form id="login-form">
                <div class="form-group">
                    <label for="login-email">E-mail</label>
                    <input type="email" id="login-email" required placeholder="seu@email.com">
                </div>
                <div class="form-group">
                    <label for="login-senha">Senha</label>
                    <input type="password" id="login-senha" required placeholder="Sua senha">
                </div>
                <button type="submit">Entrar</button>
            </form>
            <div class="toggle-link">
                Não tem uma conta? <a href="#" id="go-to-register">Cadastre-se aqui</a>
            </div>
        </div>

        <div id="register-section" class="hidden">
            <h2>Criar Conta</h2>
            <form id="register-form">
                <div class="form-group">
                    <label for="reg-nome">Nome Completo</label>
                    <input type="text" id="reg-nome" required placeholder="João Silva">
                </div>
                <div class="form-group">
                    <label for="reg-email">E-mail</label>
                    <input type="email" id="reg-email" required placeholder="seu@email.com">
                </div>
                <div class="form-group">
                    <label for="reg-senha">Senha</label>
                    <input type="password" id="reg-senha" required minlength="6" placeholder="Mínimo 6 caracteres">
                </div>
                <div class="form-group">
                    <label for="reg-perfil">Tipo de Perfil</label>
                    <select id="reg-perfil" required>
                        <option value="" disabled selected>Selecione seu perfil</option>
                        <option value="leitor">Leitor</option>
                        <option value="bibliotecario">Bibliotecário</option>
                    </select>
                </div>
                <button type="submit">Registrar</button>
            </form>
            <div class="toggle-link">
                Já possui uma conta? <a href="#" id="go-to-login">Faça login aqui</a>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
